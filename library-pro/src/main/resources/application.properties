spring.application.name=library-pro
server.port=8080

# ============================================================
# ORACLE DATABASE CONNECTION
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@fsktmdbora.upm.edu.my:1521:fsktm
spring.datasource.username=D226920
spring.datasource.password=226920
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update

# Turn OFF SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.open-in-view=false

# ============================================================
# HIKARI CONNECTION POOL
# ============================================================
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=true

# ============================================================
# FILE UPLOADS & SESSION
# ============================================================
app.upload-dir=/app/uploads

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB

server.servlet.session.timeout=30m

# ============================================================
# MEMORY OPTIMIZATION
# ============================================================
server.tomcat.max-swallow-size=3MB