<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:attr="data-bs-theme=${appSettings.themeMode == 'auto' ? 'light' : appSettings.themeMode}">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar('loans')}"></aside>

<main class="main fade-in">
    <h1 class="h3 page-title mb-1" th:text="${pageTitle}">Loan Form</h1>
    <p class="text-secondary small mb-4"
       th:text="'Loan period: ' + ${appSettings.maxLoanDays} + ' days · max ' + ${appSettings.maxBooksPerMember} + ' books per member · fine RM' + ${appSettings.finePerDay} + '/day'"></p>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card glass p-4" style="max-width: 760px">
        <form th:action="@{${formAction}}" th:object="${loan}" method="post" novalidate>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="member">Member *</label>
                    <select id="member" class="form-select" th:field="*{member.id}"
                            th:classappend="${#fields.hasErrors('member')} ? 'is-invalid'">
                        <option value="">-- select member --</option>
                        <option th:each="m : ${memberOptions}" th:value="${m.id}"
                                th:text="${m.fullName} + ' (' + ${m.matricNo} + ')'"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{member}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="book">Book *</label>
                    <select id="book" class="form-select" th:field="*{book.id}"
                            th:classappend="${#fields.hasErrors('book')} ? 'is-invalid'">
                        <option value="">-- select book --</option>
                        <option th:each="b : ${bookOptions}" th:value="${b.id}"
                                th:disabled="${b.availableCopies == 0}"
                                th:text="${b.title} + ' (' + ${b.availableCopies} + ' available)'"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{book}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="loanDate">Loan Date *</label>
                    <input id="loanDate" type="date" class="form-control" th:field="*{loanDate}"
                           th:classappend="${#fields.hasErrors('loanDate')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{loanDate}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="dueDate">Due Date
                        <span class="text-secondary small">(blank = loan date + max loan days)</span></label>
                    <input id="dueDate" type="date" class="form-control" th:field="*{dueDate}"
                           th:classappend="${#fields.hasErrors('dueDate')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{dueDate}"></div>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary" type="submit"><i class="bi bi-save me-1"></i> Save</button>
                <a class="btn btn-outline-secondary" th:href="@{/loans}">Cancel</a>
            </div>
        </form>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
