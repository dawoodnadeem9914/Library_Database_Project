<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | ' + ${appSettings.libraryName}">Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<!-- ================= Sidebar navigation ================= -->
<aside class="sidebar" th:fragment="sidebar(active)">
    <a class="brand" th:href="@{/dashboard}">
        <span class="logo"><i class="bi bi-book-half"></i></span>
        <span th:text="${appSettings.libraryName}">Library</span>
    </a>
    <nav class="nav flex-column">
        <a class="nav-link" th:href="@{/dashboard}" th:classappend="${active=='dashboard'} ? 'active'">
            <i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link" th:href="@{/books}" th:classappend="${active=='books'} ? 'active'">
            <i class="bi bi-journal-bookmark"></i> Books</a>
        <a class="nav-link" sec:authorize="hasAnyRole('ADMIN','LIBRARIAN','STAFF')"
           th:href="@{/members}" th:classappend="${active=='members'} ? 'active'">
            <i class="bi bi-people"></i> Members</a>
        <a class="nav-link" sec:authorize="hasAnyRole('ADMIN','LIBRARIAN','STAFF')"
           th:href="@{/loans}" th:classappend="${active=='loans'} ? 'active'">
            <i class="bi bi-arrow-left-right"></i> Loans</a>
        <a class="nav-link" sec:authorize="hasAnyRole('ADMIN','LIBRARIAN','STAFF')"
           th:href="@{/reports}" th:classappend="${active=='reports'} ? 'active'">
            <i class="bi bi-graph-up"></i> Reports</a>

        <div class="nav-section" sec:authorize="hasRole('ADMIN')">Administration</div>
        <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/users}"
           th:classappend="${active=='users'} ? 'active'">
            <i class="bi bi-person-gear"></i> Users</a>
        <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/settings}"
           th:classappend="${active=='settings'} ? 'active'">
            <i class="bi bi-gear"></i> Settings</a>

        <div class="nav-section">Account</div>
        <a class="nav-link" th:href="@{/profile}" th:classappend="${active=='profile'} ? 'active'">
            <i class="bi bi-person-circle"></i> My Profile</a>
        <a class="nav-link" th:href="@{/about}" th:classappend="${active=='about'} ? 'active'">
            <i class="bi bi-info-circle"></i> About</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="mt-3">
        <button class="nav-link border-0 w-100 text-start bg-transparent" type="submit">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </form>
    <div class="footer">
        <i class="bi bi-person-circle me-1"></i>
        <span sec:authentication="name">user</span>
        (<span sec:authentication="authorities">role</span>)
    </div>
</aside>

<!-- ================= Toast notifications ================= -->
<div th:fragment="alerts" class="toast-container-app">
    <div class="toast-app success" th:if="${success}">
        <i class="bi bi-check-circle-fill mt-1"></i>
        <div>
            <strong class="d-block">Success</strong>
            <span class="small" th:text="${success}"></span>
        </div>
        <button type="button" class="btn-close btn-close-sm"
                onclick="this.parentElement.remove()"></button>
    </div>
    <div class="toast-app error" th:if="${error}">
        <i class="bi bi-exclamation-triangle-fill mt-1"></i>
        <div>
            <strong class="d-block">Error</strong>
            <span class="small" th:text="${error}"></span>
        </div>
        <button type="button" class="btn-close btn-close-sm"
                onclick="this.parentElement.remove()"></button>
    </div>
    <div class="toast-app info" th:if="${info}">
        <i class="bi bi-info-circle-fill mt-1"></i>
        <div>
            <strong class="d-block">Info</strong>
            <span class="small" th:text="${info}"></span>
        </div>
        <button type="button" class="btn-close btn-close-sm"
                onclick="this.parentElement.remove()"></button>
    </div>
    <div class="toast-app warning" th:if="${warning}">
        <i class="bi bi-exclamation-circle-fill mt-1"></i>
        <div>
            <strong class="d-block">Warning</strong>
            <span class="small" th:text="${warning}"></span>
        </div>
        <button type="button" class="btn-close btn-close-sm"
                onclick="this.parentElement.remove()"></button>
    </div>
</div>

<!-- ================= Pagination ================= -->
<nav th:fragment="pagination(page, baseUrl, keyword)" th:if="${page.totalPages > 1}">
    <ul class="pagination justify-content-center mt-3">
        <li class="page-item" th:classappend="${page.first} ? 'disabled'">
            <a class="page-link" th:href="@{${baseUrl}(page=${page.number-1}, keyword=${keyword})}">&laquo;</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages-1)}"
            th:classappend="${i == page.number} ? 'active'">
            <a class="page-link" th:href="@{${baseUrl}(page=${i}, keyword=${keyword})}" th:text="${i+1}"></a>
        </li>
        <li class="page-item" th:classappend="${page.last} ? 'disabled'">
            <a class="page-link" th:href="@{${baseUrl}(page=${page.number+1}, keyword=${keyword})}">&raquo;</a>
        </li>
    </ul>
</nav>

<!-- ================= Scripts ================= -->
<th:block th:fragment="scripts">
    <div id="page-loader"><div class="spinner-border" role="status"></div></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        // ---- Auto theme: follow OS preference when themeMode = 'auto' ----
        (function () {
            const mode = /*[[${appSettings.themeMode}]]*/ 'light';
            if (mode === 'auto') {
                const mq = window.matchMedia('(prefers-color-scheme: dark)');
                const apply = () => document.documentElement
                    .setAttribute('data-bs-theme', mq.matches ? 'dark' : 'light');
                apply();
                mq.addEventListener('change', apply);
            }
        })();

        // ---- Toasts: auto hide after 4.5s ----
        document.querySelectorAll('.toast-app').forEach(t => {
    setTimeout(() => {
        t.classList.add('hide');
        setTimeout(() => t.remove(), 350);
    }, 5000);
});

// ---- Delete-modal safety net (works even if Bootstrap JS is slow) ----
        function killModals() {
            document.querySelectorAll('.modal.show').forEach(m => {
                m.classList.remove('show'); m.style.display = 'none';
            });
            document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        }
        document.addEventListener('click', e => {
            if (e.target.matches('[data-bs-dismiss="modal"], .modal')) killModals();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') killModals(); });

        // ---- Loading indicator on form submit / nav clicks ----
        const loader = document.getElementById('page-loader');
        // Only show loader for forms that navigate away (NOT inside modals)
        document.querySelectorAll('form[method="post"]').forEach(f => {
            if (!f.closest('.modal')) {
                f.addEventListener('submit', () => loader.classList.add('show'));
            }
        });
        // Always hide loader on page show (handles back/forward cache too)
        window.addEventListener('pageshow', () => loader.classList.remove('show'));
        // Also force-hide loader if any modal opens (safety net for stuck loader)
        document.addEventListener('show.bs.modal', () => loader.classList.remove('show'));
        // Fix: clean up modal backdrop/body lock after modal closes (prevents screen freeze)
        document.addEventListener('hidden.bs.modal', () => {
            loader.classList.remove('show');
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        });
        /*]]>*/
    </script>
</th:block>
</body>
</html>
