<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:attr="data-bs-theme=${appSettings.themeMode == 'auto' ? 'light' : appSettings.themeMode}">
<head th:replace="~{fragments/layout :: head('Members')}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar('members')}"></aside>

<main class="main fade-in">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div>
            <h1 class="h3 page-title mb-0">Members</h1>
            <span class="text-secondary small" th:text="${members.totalElements} + ' registered members'"></span>
        </div>
        <a class="btn btn-primary" th:href="@{/members/new}"><i class="bi bi-person-plus me-1"></i> Register Member</a>
    </div>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card glass mb-3 p-3">
        <form class="row g-2" th:action="@{/members}" method="get">
            <div class="col-md-6 col-lg-5">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input class="form-control" type="text" name="keyword" th:value="${keyword}"
                           placeholder="Search by name or matric number...">
                </div>
            </div>
            <div class="col-auto"><button class="btn btn-outline-primary" type="submit">Search</button></div>
            <div class="col-auto" th:if="${keyword}"><a class="btn btn-outline-secondary" th:href="@{/members}">Clear</a></div>
        </form>
    </div>

    <div class="card glass">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr><th></th><th>Name</th><th>Matric/Staff No</th><th>Email</th><th>Phone</th>
                    <th>Type</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="m : ${members.content}">
                    <td>
                        <img th:if="${m.photoUrl}" th:src="${m.photoUrl}" alt="photo"
                             class="rounded-circle object-fit-cover" style="width:42px;height:42px">
                        <span th:unless="${m.photoUrl}" class="avatar"
                              th:text="${#strings.substring(m.fullName,0,1)}">A</span>
                    </td>
                    <td><a class="fw-semibold text-decoration-none"
                           th:href="@{/members/{id}(id=${m.id})}" th:text="${m.fullName}">Name</a></td>
                    <td th:text="${m.matricNo}"></td>
                    <td th:text="${m.email}"></td>
                    <td th:text="${m.phone}"></td>
                    <td>
                        <span class="badge text-bg-info" th:if="${m.memberType=='STUDENT'}">STUDENT</span>
                        <span class="badge text-bg-dark" th:if="${m.memberType=='STAFF'}">STAFF</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/members/{id}(id=${m.id})}"
                           title="Profile"><i class="bi bi-eye"></i></a>
                        <a class="btn btn-sm btn-outline-warning" th:href="@{/members/{id}/edit(id=${m.id})}"
                           title="Edit"><i class="bi bi-pencil"></i></a>
                        <button class="btn btn-sm btn-outline-danger" title="Delete (admin only)"
                                sec:authorize="hasRole('ADMIN')"
                                th:data-member-id="${m.id}"
                                th:data-member-name="${m.fullName}"
                                th:data-delete-url="@{/members/{id}/delete(id=${m.id})}"
                                onclick="confirmDelete(this)">
                            <i class="bi bi-trash"></i></button>
                    </td>
                </tr>
                <tr th:if="${members.totalElements == 0}">
                    <td colspan="7" class="text-center text-secondary py-4">No members found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:replace="~{fragments/layout :: pagination(${members}, '/members', ${keyword})}"></nav>
</main>

<!-- Single shared delete modal (outside the table, at body level) -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-start">
                Delete member <strong id="deleteModalName"></strong>?
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteModalForm" method="post">
                    <button class="btn btn-danger" type="submit">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
    function confirmDelete(btn) {
        document.getElementById('deleteModalName').textContent = btn.getAttribute('data-member-name');
        document.getElementById('deleteModalForm').action = btn.getAttribute('data-delete-url');
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>
</body>
</html>
