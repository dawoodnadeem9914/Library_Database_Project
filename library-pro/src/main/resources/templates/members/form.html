<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:attr="data-bs-theme=${appSettings.themeMode == 'auto' ? 'light' : appSettings.themeMode}">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar('members')}"></aside>

<main class="main fade-in">
    <h1 class="h3 page-title mb-1" th:text="${pageTitle}">Member Form</h1>
    <p class="text-secondary small mb-4">Fields marked * are required &middot; email and matric number must be unique</p>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card glass p-4" style="max-width: 760px">
        <form th:action="@{${formAction}}" th:object="${member}" method="post"
              enctype="multipart/form-data" novalidate>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="fullName">Full Name *</label>
                    <input id="fullName" type="text" class="form-control" th:field="*{fullName}"
                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{fullName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="matricNo">Matric / Staff No *</label>
                    <input id="matricNo" type="text" class="form-control" th:field="*{matricNo}"
                           th:classappend="${#fields.hasErrors('matricNo')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{matricNo}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="email">Email *</label>
                    <input id="email" type="email" class="form-control" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="phone">Phone *</label>
                    <input id="phone" type="text" class="form-control" th:field="*{phone}"
                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{phone}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="photoFile">Profile Photo</label>
                    <input id="photoFile" name="photoFile" type="file" class="form-control"
                           accept="image/png,image/jpeg,image/webp">
                    <div class="form-text">Optional · JPG/PNG/WEBP, max 5 MB</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="memberType">Member Type *</label>
                    <select id="memberType" class="form-select" th:field="*{memberType}"
                            th:classappend="${#fields.hasErrors('memberType')} ? 'is-invalid'">
                        <option value="">-- select --</option>
                        <option value="STUDENT">Student</option>
                        <option value="STAFF">Staff</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{memberType}"></div>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary" type="submit"><i class="bi bi-save me-1"></i> Save</button>
                <a class="btn btn-outline-secondary" th:href="@{/members}">Cancel</a>
            </div>
        </form>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
