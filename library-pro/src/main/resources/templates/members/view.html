<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:attr="data-bs-theme=${appSettings.themeMode == 'auto' ? 'light' : appSettings.themeMode}">
<head th:replace="~{fragments/layout :: head(${member.fullName})}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar('members')}"></aside>

<main class="main fade-in">
    <a class="text-decoration-none small" th:href="@{/members}"><i class="bi bi-arrow-left"></i> Back to Members</a>

    <div class="row g-3 mt-1" style="max-width: 980px">
        <div class="col-md-4">
            <div class="card glass p-4 text-center h-100">
                <img th:if="${member.photoUrl}" th:src="${member.photoUrl}" alt="photo"
                     class="rounded-circle mx-auto mb-3 object-fit-cover"
                     style="width:84px;height:84px">
                <span th:unless="${member.photoUrl}" class="avatar mx-auto mb-3"
                      style="width:84px;height:84px;font-size:2rem"
                      th:text="${#strings.substring(member.fullName,0,1)}">A</span>
                <h1 class="h5 fw-bold mb-1" th:text="${member.fullName}">Name</h1>
                <span class="badge text-bg-info mx-auto" th:if="${member.memberType=='STUDENT'}">STUDENT</span>
                <span class="badge text-bg-dark mx-auto" th:if="${member.memberType=='STAFF'}">STAFF</span>
                <hr>
                <div class="text-start small">
                    <p class="mb-2"><i class="bi bi-person-badge me-2"></i><span th:text="${member.matricNo}"></span></p>
                    <p class="mb-2"><i class="bi bi-envelope me-2"></i><span th:text="${member.email}"></span></p>
                    <p class="mb-2"><i class="bi bi-telephone me-2"></i><span th:text="${member.phone}"></span></p>
                    <p class="mb-0"><i class="bi bi-calendar-plus me-2"></i>Joined
                        <span th:text="${#temporals.format(member.createdAt, 'dd MMM yyyy')}"></span></p>
                </div>
                <div class="row g-2 mt-1">
                    <div class="col-6">
                        <div class="p-2 rounded-3" style="background:rgba(63,124,192,.12)">
                            <div class="fw-bold fs-5" th:text="${activeLoanCount}">0</div>
                            <div class="small text-secondary">Active Loans</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="p-2 rounded-3" style="background:rgba(215,84,84,.12)">
                            <div class="fw-bold fs-5" th:text="'RM ' + ${#numbers.formatDecimal(totalFines,1,2)}">RM 0.00</div>
                            <div class="small text-secondary">Outstanding Fines</div>
                        </div>
                    </div>
                </div>
                <a class="btn btn-warning mt-3" th:href="@{/members/{id}/edit(id=${member.id})}">
                    <i class="bi bi-pencil me-1"></i> Edit Profile</a>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card glass h-100">
                <div class="card-header bg-transparent fw-bold">
                    <i class="bi bi-clock-history me-1"></i> Borrowing History</div>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead><tr><th>Book</th><th>Loan Date</th><th>Due</th><th>Returned</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:each="loan : ${member.loans}">
                            <td th:text="${loan.book.title}"></td>
                            <td th:text="${loan.loanDate}"></td>
                            <td th:text="${loan.dueDate}"></td>
                            <td th:text="${loan.returnDate} ?: '-'"></td>
                            <td>
                                <span class="badge text-bg-warning" th:if="${loan.status=='BORROWED'}">BORROWED</span>
                                <span class="badge text-bg-success" th:if="${loan.status=='RETURNED'}">RETURNED</span>
                                <span class="badge text-bg-danger"  th:if="${loan.status=='OVERDUE'}">OVERDUE</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(member.loans)}">
                            <td colspan="5" class="text-center text-secondary py-4">No loans yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
