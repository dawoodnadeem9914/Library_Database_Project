<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="login-page">
    <div class="login-card fade-in text-center" style="max-width:480px">
        <div class="logo"><i class="bi bi-shield-lock"></i></div>
        <h1 class="display-5 fw-bold mb-0">403</h1>
        <h2 class="h5 fw-bold mb-3">Access Denied</h2>
        <p class="small" style="color:#bcd0e4">
            You do not have permission to view this page. Contact your administrator if you believe this is a mistake.
        </p>
        <div class="d-flex gap-2 mt-4">
            <a class="btn btn-warning fw-bold flex-fill" th:href="@{/dashboard}">
                <i class="bi bi-house me-1"></i> Dashboard</a>
            <a class="btn btn-outline-light flex-fill" href="javascript:history.back()">
                <i class="bi bi-arrow-left me-1"></i> Go Back</a>
        </div>
    </div>
</div>
</body>
</html>
