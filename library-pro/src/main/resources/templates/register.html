<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Create Account | ' + ${appSettings.libraryName}">Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="login-page">
    <div class="login-card fade-in" style="max-width: 520px">
        <div class="text-center">
            <div class="logo"><i class="bi bi-person-plus"></i></div>
            <h1 class="h4 fw-bold mb-1">Create Account</h1>
            <p class="small mb-4" style="color:#bcd0e4" th:text="${appSettings.libraryName} + ' · Staff Portal'"></p>
        </div>

        <form th:action="@{/register}" th:object="${form}" method="post"
              enctype="multipart/form-data" novalidate>
            <div class="alert alert-danger py-2 small" th:if="${#fields.hasGlobalErrors()}">
                <i class="bi bi-exclamation-triangle me-1"></i>
                <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
            </div>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label small" for="fullName">Full Name</label>
                    <input id="fullName" type="text" class="form-control" th:field="*{fullName}"
                           placeholder="e.g. Ahmad Faiz bin Rahman"
                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{fullName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label small" for="username">Username</label>
                    <input id="username" type="text" class="form-control" th:field="*{username}"
                           placeholder="Choose a username" onblur="checkUsername()"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{username}"></div>
                    <div class="small mt-1" id="unameStatus"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label small" for="email">Email</label>
                    <input id="email" type="email" class="form-control" th:field="*{email}"
                           placeholder="you@unimas.my"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label small" for="password">Password</label>
                    <div class="input-group">
                        <input id="password" type="password" class="form-control" th:field="*{password}"
                               placeholder="Min. 8 characters" oninput="checkStrength()"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                        <span class="input-group-text bg-transparent border-light text-light toggle-password"
                              onclick="togglePassword('password', this)"><i class="bi bi-eye"></i></span>
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="pw-meter" id="pwMeter"><div></div></div>
                    <div class="small mt-1" id="pwLabel" style="color:#bcd0e4"></div>
                    <div class="pw-rules mt-1" id="pwRules">
                        <span id="r-len" class="no">✓ 8+ chars</span> ·
                        <span id="r-up" class="no">✓ uppercase</span> ·
                        <span id="r-low" class="no">✓ lowercase</span> ·
                        <span id="r-num" class="no">✓ number</span> ·
                        <span id="r-spec" class="no">✓ special</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label small" for="confirmPassword">Confirm Password</label>
                    <div class="input-group">
                        <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}"
                               placeholder="Repeat password" oninput="checkMatch()"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                        <span class="input-group-text bg-transparent border-light text-light toggle-password"
                              onclick="togglePassword('confirmPassword', this)"><i class="bi bi-eye"></i></span>
                        <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>
                <div class="col-md-6" id="matchBox" style="display:none">
                    <div class="small" id="matchStatus"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label small" for="role">Role</label>
                    <select id="role" class="form-select" th:field="*{role}"
                            th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                        <option value="">-- select role --</option>
                        <option value="STAFF">Staff</option>
                        <option value="MEMBER">Member</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{role}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label small" for="avatarFile">Profile Photo (optional)</label>
                    <input id="avatarFile" name="avatarFile" type="file" class="form-control"
                           accept="image/png,image/jpeg,image/webp">
                    <div class="form-text" style="color:#9db9d6">Skipped? We generate an initials avatar.</div>
                </div>
                <div class="col-12">
                    <div class="form-text" style="color:#9db9d6">
                        Librarian and Administrator accounts are created by the system admin.</div>
                </div>
            </div>
            <button class="btn btn-warning w-100 fw-bold mt-4" type="submit">
                <i class="bi bi-person-plus me-1"></i> Create Account
            </button>
        </form>

        <p class="text-center small mt-4 mb-0" style="color:#bcd0e4">
            Already have an account?
            <a th:href="@{/login}" style="color:#f4a259" class="fw-semibold">Sign in</a>
        </p>
    </div>
</div>
<script>
    // ---- Password strength meter + live rules ----
    function checkStrength() {
        const v = document.getElementById('password').value;
        const rules = {
            'r-len': v.length >= 8,
            'r-up': /[A-Z]/.test(v),
            'r-low': /[a-z]/.test(v),
            'r-num': /\d/.test(v),
            'r-spec': /[^A-Za-z0-9]/.test(v)
        };
        let score = 0;
        for (const [id, ok] of Object.entries(rules)) {
            document.getElementById(id).className = ok ? 'ok' : 'no';
            if (ok) score++;
        }
        const meter = document.getElementById('pwMeter');
        const label = document.getElementById('pwLabel');
        meter.className = 'pw-meter';
        if (!v) { label.textContent = ''; return; }
        if (score <= 2)      { meter.classList.add('pw-weak');   label.textContent = 'Strength: Weak';   }
        else if (score <= 4) { meter.classList.add('pw-medium'); label.textContent = 'Strength: Medium'; }
        else                 { meter.classList.add('pw-strong'); label.textContent = 'Strength: Strong'; }
        checkMatch();
    }

    // ---- Live confirm-password match ----
    function checkMatch() {
        const p = document.getElementById('password').value;
        const c = document.getElementById('confirmPassword').value;
        const box = document.getElementById('matchBox');
        const st = document.getElementById('matchStatus');
        if (!c) { box.style.display = 'none'; return; }
        box.style.display = 'block';
        if (p === c) { st.innerHTML = '<span style="color:#22c55e"><i class="bi bi-check-circle"></i> Passwords match</span>'; }
        else { st.innerHTML = '<span style="color:#ef4444"><i class="bi bi-x-circle"></i> Passwords do not match</span>'; }
    }

    // ---- Live username availability ----
    function checkUsername() {
        const u = document.getElementById('username').value.trim();
        const st = document.getElementById('unameStatus');
        if (u.length < 3) { st.innerHTML = ''; return; }
        fetch('/api/username-available?u=' + encodeURIComponent(u))
            .then(r => r.json())
            .then(d => {
                st.innerHTML = d.available
                    ? '<span style="color:#22c55e"><i class="bi bi-check-circle"></i> Username available</span>'
                    : '<span style="color:#ef4444"><i class="bi bi-x-circle"></i> Username already taken</span>';
            }).catch(() => st.innerHTML = '');
    }

    function togglePassword(id, el) {
        const input = document.getElementById(id);
        const icon = el.querySelector('i');
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    }
</script>
</body>
</html>
