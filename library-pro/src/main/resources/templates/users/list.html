<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:attr="data-bs-theme=${appSettings.themeMode == 'auto' ? 'light' : appSettings.themeMode}">
<head th:replace="~{fragments/layout :: head('Users')}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar('users')}"></aside>

<main class="main fade-in">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div>
            <h1 class="h3 page-title mb-0">User Management</h1>
            <span class="text-secondary small" th:text="${users.totalElements} + ' system accounts'"></span>
        </div>
        <a class="btn btn-primary" th:href="@{/users/new}"><i class="bi bi-person-plus me-1"></i> Create User</a>
    </div>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card glass mb-3 p-3">
        <form class="row g-2" th:action="@{/users}" method="get">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input class="form-control" type="text" name="keyword" th:value="${keyword}"
                           placeholder="Search username, name or email...">
                </div>
            </div>
            <div class="col-md-2">
                <select class="form-select" name="role">
                    <option value="">All roles</option>
                    <option th:selected="${role == 'ADMIN'}">ADMIN</option>
                    <option th:selected="${role == 'LIBRARIAN'}">LIBRARIAN</option>
                    <option th:selected="${role == 'STAFF'}">STAFF</option>
                    <option th:selected="${role == 'MEMBER'}">MEMBER</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" name="status">
                    <option value="">All statuses</option>
                    <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Active</option>
                    <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Inactive</option>
                </select>
            </div>
            <div class="col-auto"><button class="btn btn-outline-primary" type="submit">
                <i class="bi bi-funnel me-1"></i>Filter</button></div>
            <div class="col-auto"><a class="btn btn-outline-secondary" th:href="@{/users}">Clear</a></div>
        </form>
    </div>

    <div class="card glass">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr><th></th><th>Username</th><th>Full Name</th><th>Email</th><th>Role</th>
                    <th>Status</th><th>Created</th><th>Last Login</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users.content}">
                    <td>
                        <img th:if="${u.avatarUrl != null and !u.avatarUrl.isEmpty()}"
                             th:src="${u.avatarUrl.startsWith('/') ? u.avatarUrl : '/uploads/' + u.avatarUrl}"
                             alt="avatar" class="rounded-circle object-fit-cover"
                             style="width:38px;height:38px"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">
                        <span th:classappend="${u.avatarUrl != null and !u.avatarUrl.isEmpty()} ? 'd-none' : ''"
                              class="avatar" style="width:38px;height:38px"
                              th:text="${#strings.substring(u.fullName ?: u.username,0,1)}">A</span>
                    </td>
                    <td class="fw-semibold" th:text="${u.username}"></td>
                    <td th:text="${u.fullName} ?: '-'"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span class="badge text-bg-danger"    th:if="${u.role=='ADMIN'}">ADMIN</span>
                        <span class="badge text-bg-primary"   th:if="${u.role=='LIBRARIAN'}">LIBRARIAN</span>
                        <span class="badge text-bg-info"      th:if="${u.role=='STAFF'}">STAFF</span>
                        <span class="badge text-bg-secondary" th:if="${u.role=='MEMBER'}">MEMBER</span>
                    </td>
                    <td>
                        <span class="badge badge-available" th:if="${u.active}">Active</span>
                        <span class="badge badge-out" th:unless="${u.active}">Inactive</span>
                    </td>
                    <td class="small" th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></td>
                    <td class="small" th:text="${u.lastLogin != null} ? ${#temporals.format(u.lastLogin,'dd MMM HH:mm')} : 'Never'"></td>
                    <td class="text-end text-nowrap">
                        <a class="btn btn-sm btn-outline-warning" th:href="@{/users/{id}/edit(id=${u.id})}"
                           title="Edit"><i class="bi bi-pencil"></i></a>
                        <form class="d-inline" th:action="@{/users/{id}/toggle(id=${u.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-sm btn-outline-info" type="submit"
                                    th:title="${u.active} ? 'Deactivate' : 'Activate'">
                                <i class="bi" th:classappend="${u.active} ? 'bi-pause-circle' : 'bi-play-circle'"></i>
                            </button>
                        </form>
                        <button class="btn btn-sm btn-outline-secondary" title="Reset password"
                                th:attr="data-user-id=${u.id}, data-username=${u.username}, data-reset-url=@{/users/{id}/reset-password(id=${u.id})}">
                            <i class="bi bi-key"></i></button>
                        <button class="btn btn-sm btn-outline-danger" title="Delete"
                                th:attr="data-user-id=${u.id}, data-username=${u.username}, data-delete-url=@{/users/{id}/delete(id=${u.id})}">
                            <i class="bi bi-trash"></i></button>
                    </td>
                </tr>
                <tr th:if="${users.totalElements == 0}">
                    <td colspan="9" class="text-center text-secondary py-4">No users found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${users.totalPages > 1}">
        <ul class="pagination justify-content-center mt-3">
            <li class="page-item" th:classappend="${users.first} ? 'disabled'">
                <a class="page-link" th:href="@{/users(page=${users.number-1},keyword=${keyword},role=${role},status=${status})}">&laquo;</a></li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages-1)}"
                th:classappend="${i == users.number} ? 'active'">
                <a class="page-link" th:href="@{/users(page=${i},keyword=${keyword},role=${role},status=${status})}" th:text="${i+1}"></a></li>
            <li class="page-item" th:classappend="${users.last} ? 'disabled'">
                <a class="page-link" th:href="@{/users(page=${users.number+1},keyword=${keyword},role=${role},status=${status})}">&raquo;</a></li>
        </ul>
    </nav>
</main>

<!-- ===== Reset Password Modal (single, shared) ===== -->
<div class="modal fade" id="pwModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="pwForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-header">
                    <h5 class="modal-title">Reset Password &mdash; <span id="pwUsername"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-start">
                    <label class="form-label">New Password (min 8 characters)</label>
                    <input class="form-control" type="text" name="newPassword"
                           minlength="8" required placeholder="Type a new password">
                    <div class="form-text">Also clears any account lock.</div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" type="submit">Reset</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== Delete Confirm Modal (single, shared) ===== -->
<div class="modal fade" id="delModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-start">
                Delete user <strong id="delUsername"></strong>? This cannot be undone.
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="delForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-danger" type="submit">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    // Wire up Reset Password buttons
    document.querySelectorAll('[data-reset-url]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.getElementById('pwUsername').textContent = btn.getAttribute('data-username');
            document.getElementById('pwForm').action = btn.getAttribute('data-reset-url');
            document.getElementById('pwForm').querySelector('input[name="newPassword"]').value = '';
            new bootstrap.Modal(document.getElementById('pwModal')).show();
        });
    });

    // Wire up Delete buttons
    document.querySelectorAll('[data-delete-url]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.getElementById('delUsername').textContent = btn.getAttribute('data-username');
            document.getElementById('delForm').action = btn.getAttribute('data-delete-url');
            new bootstrap.Modal(document.getElementById('delModal')).show();
        });
    });
</script>
</body>
</html>
