<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:attr="data-bs-theme=${appSettings.themeMode == 'auto' ? 'light' : appSettings.themeMode}">
<head th:replace="~{fragments/layout :: head('Books')}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar('books')}"></aside>

<main class="main fade-in">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div>
            <h1 class="h3 page-title mb-0">Books</h1>
            <span class="text-secondary small" th:text="${books.totalElements} + ' titles in the catalogue'"></span>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <th:block sec:authorize="hasAnyRole('ADMIN','LIBRARIAN','STAFF')">
                <a class="btn btn-outline-danger"
                   th:href="@{/books/export/pdf(keyword=${keyword}, category=${category})}">
                    <i class="bi bi-file-earmark-pdf me-1"></i> PDF</a>
                <a class="btn btn-outline-success"
                   th:href="@{/books/export/excel(keyword=${keyword}, category=${category})}">
                    <i class="bi bi-file-earmark-excel me-1"></i> Excel</a>
                <a class="btn btn-outline-info"
                   th:href="@{/books/export/csv(keyword=${keyword}, category=${category})}">
                    <i class="bi bi-filetype-csv me-1"></i> CSV</a>
            </th:block>
            <a class="btn btn-primary" sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')"
               th:href="@{/books/new}"><i class="bi bi-plus-lg me-1"></i> Add Book</a>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="card glass mb-3 p-3">
        <form class="row g-2" th:action="@{/books}" method="get">
            <div class="col-md-5 col-lg-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input class="form-control" type="text" name="keyword" th:value="${keyword}"
                           placeholder="Search title, author or ISBN...">
                </div>
            </div>
            <div class="col-md-3 col-lg-3">
                <select class="form-select" name="category">
                    <option value="">All categories</option>
                    <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"
                            th:selected="${c == category}"></option>
                </select>
            </div>
            <div class="col-auto"><button class="btn btn-outline-primary" type="submit">
                <i class="bi bi-funnel me-1"></i>Filter</button></div>
            <div class="col-auto" th:if="${keyword != null or category != null}">
                <a class="btn btn-outline-secondary" th:href="@{/books}">Clear</a></div>
        </form>
    </div>

    <div class="card glass">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th>Cover</th>
                    <th><a class="sort-link" th:href="@{/books(keyword=${keyword},category=${category},sort='title',dir=${sort=='title' ? revDir : 'asc'})}">
                        Title <i class="bi" th:classappend="${sort=='title'} ? (${dir=='asc'} ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up'"></i></a></th>
                    <th><a class="sort-link" th:href="@{/books(keyword=${keyword},category=${category},sort='author',dir=${sort=='author' ? revDir : 'asc'})}">
                        Author <i class="bi" th:classappend="${sort=='author'} ? (${dir=='asc'} ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up'"></i></a></th>
                    <th>ISBN</th>
                    <th><a class="sort-link" th:href="@{/books(keyword=${keyword},category=${category},sort='category',dir=${sort=='category' ? revDir : 'asc'})}">
                        Category <i class="bi" th:classappend="${sort=='category'} ? (${dir=='asc'} ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up'"></i></a></th>
                    <th><a class="sort-link" th:href="@{/books(keyword=${keyword},category=${category},sort='publicationYear',dir=${sort=='publicationYear' ? revDir : 'asc'})}">
                        Year <i class="bi" th:classappend="${sort=='publicationYear'} ? (${dir=='asc'} ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up'"></i></a></th>
                    <th><a class="sort-link" th:href="@{/books(keyword=${keyword},category=${category},sort='availableCopies',dir=${sort=='availableCopies' ? revDir : 'asc'})}">
                        Availability <i class="bi" th:classappend="${sort=='availableCopies'} ? (${dir=='asc'} ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up'"></i></a></th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books.content}">
                    <td>
                        <img class="book-cover" th:if="${book.imageUrl}" th:src="${book.imageUrl}" alt="cover">
                        <div class="book-cover cover-placeholder" th:unless="${book.imageUrl}">
                            <i class="bi bi-book"></i></div>
                    </td>
                    <td>
                        <a class="fw-semibold text-decoration-none" th:href="@{/books/{id}(id=${book.id})}"
                           th:text="${book.title}">Title</a>
                        <div class="small text-secondary" th:text="${book.publisher} ?: ''"></div>
                    </td>
                    <td th:text="${book.author}"></td>
                    <td><code th:text="${book.isbn}"></code></td>
                    <td><span class="badge text-bg-secondary" th:text="${book.category}"></span></td>
                    <td th:text="${book.publicationYear} ?: '-'"></td>
                    <td>
                        <span class="badge badge-available" th:if="${book.availableCopies > 2}"
                              th:text="${book.availableCopies} + ' available'"></span>
                        <span class="badge badge-low" th:if="${book.availableCopies > 0 and book.availableCopies <= 2}"
                              th:text="'Low: ' + ${book.availableCopies} + ' left'"></span>
                        <span class="badge badge-out" th:if="${book.availableCopies == 0}">Out of stock</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/books/{id}(id=${book.id})}"
                           title="View"><i class="bi bi-eye"></i></a>
                        <a class="btn btn-sm btn-outline-warning" th:href="@{/books/{id}/edit(id=${book.id})}"
                           sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')"
                           title="Edit"><i class="bi bi-pencil"></i></a>
                        <form class="d-inline" sec:authorize="hasRole('ADMIN')"
                              th:action="@{/books/{id}/delete(id=${book.id})}" method="post"
                              onsubmit="return confirm('Delete this book?');">
                            <button class="btn btn-sm btn-outline-danger" type="submit" title="Delete">
                                <i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${books.totalElements == 0}">
                    <td colspan="8" class="text-center text-secondary py-4">No books found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${books.totalPages > 1}">
        <ul class="pagination justify-content-center mt-3">
            <li class="page-item" th:classappend="${books.first} ? 'disabled'">
                <a class="page-link" th:href="@{/books(page=${books.number-1},keyword=${keyword},category=${category},sort=${sort},dir=${dir})}">&laquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, books.totalPages-1)}"
                th:classappend="${i == books.number} ? 'active'">
                <a class="page-link" th:href="@{/books(page=${i},keyword=${keyword},category=${category},sort=${sort},dir=${dir})}" th:text="${i+1}"></a>
            </li>
            <li class="page-item" th:classappend="${books.last} ? 'disabled'">
                <a class="page-link" th:href="@{/books(page=${books.number+1},keyword=${keyword},category=${category},sort=${sort},dir=${dir})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
