<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:attr="data-bs-theme=${appSettings.themeMode == 'auto' ? 'light' : appSettings.themeMode}">
<head th:replace="~{fragments/layout :: head(${book.title})}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar('books')}"></aside>

<main class="main fade-in">
    <a class="text-decoration-none small" th:href="@{/books}"><i class="bi bi-arrow-left"></i> Back to Books</a>

    <div class="card glass p-4 mt-3" style="max-width: 980px">
        <div class="row g-4">
            <div class="col-auto">
                <img class="book-cover-lg" th:if="${book.imageUrl}" th:src="${book.imageUrl}" alt="cover">
                <div class="book-cover-lg cover-placeholder" th:unless="${book.imageUrl}">
                    <i class="bi bi-book" style="font-size:2.6rem"></i></div>
            </div>
            <div class="col">
                <h1 class="h3 page-title mb-1" th:text="${book.title}">Title</h1>
                <p class="text-secondary mb-3" th:text="'by ' + ${book.author}">Author</p>
                <p th:text="${book.description}" th:if="${book.description}"></p>

                <div class="row row-cols-2 row-cols-md-3 g-3 mt-1">
                    <div><div class="small text-secondary">ISBN</div><code th:text="${book.isbn}"></code></div>
                    <div><div class="small text-secondary">Category</div>
                        <span class="badge text-bg-secondary" th:text="${book.category}"></span></div>
                    <div><div class="small text-secondary">Publisher</div>
                        <span th:text="${book.publisher} ?: '-'"></span></div>
                    <div><div class="small text-secondary">Year</div>
                        <span th:text="${book.publicationYear} ?: '-'"></span></div>
                    <div><div class="small text-secondary">Availability</div>
                        <span class="fw-bold" th:text="${book.availableCopies} + ' of ' + ${book.totalCopies} + ' copies'"></span></div>
                    <div><div class="small text-secondary">Last Updated</div>
                        <span th:text="${#temporals.format(book.updatedAt, 'dd MMM yyyy HH:mm')}"></span></div>
                </div>

                <div class="d-flex gap-2 mt-4"
                     sec:authorize="hasAnyRole('ADMIN','LIBRARIAN')">

                    <a class="btn btn-warning"
                       th:href="@{/books/{id}/edit(id=${book.id})}">
                        <i class="bi bi-pencil me-1"></i> Edit
                    </a>

                    <a class="btn btn-primary"
                       th:href="@{/loans/new}">
                        <i class="bi bi-arrow-left-right me-1"></i>
                        Borrow This Book
                    </a>

                </div>
            </div>
        </div>

        <hr class="my-4">
        <h2 class="h6 fw-bold"><i class="bi bi-clock-history me-1"></i> Loan History</h2>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead><tr><th>Member</th><th>Loan Date</th><th>Due Date</th><th>Returned</th><th>Status</th></tr></thead>
                <tbody>
                <tr th:each="loan : ${book.loans}">
                    <td th:text="${loan.member.fullName}"></td>
                    <td th:text="${loan.loanDate}"></td>
                    <td th:text="${loan.dueDate}"></td>
                    <td th:text="${loan.returnDate} ?: '-'"></td>
                    <td>
                        <span class="badge text-bg-warning" th:if="${loan.status=='BORROWED'}">BORROWED</span>
                        <span class="badge text-bg-success" th:if="${loan.status=='RETURNED'}">RETURNED</span>
                        <span class="badge text-bg-danger"  th:if="${loan.status=='OVERDUE'}">OVERDUE</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(book.loans)}">
                    <td colspan="5" class="text-center text-secondary py-3">This book has never been borrowed.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
