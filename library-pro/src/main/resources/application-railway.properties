# ============================================================
# RAILWAY DEPLOYMENT PROFILE
# Uses H2 in-memory DB since Oracle (UPM) is behind university firewall
# Activated automatically by railway.toml start command
# ============================================================

spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# Disable Oracle-specific features on Railway
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=30000
